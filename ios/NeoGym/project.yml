---
name: NeoGym
options:
  minimumXcodeGenVersion: 2.44.0
  postGenCommand: python3 Scripts/disable-xcode-debug-options.py
  deploymentTarget:
    iOS: "26.6"
configs:
  Debug-Development: debug
  Release-Development: release
  Debug-Production: debug
  Release-Production: release
configFiles:
  Debug-Development: Configuration/Development.xcconfig
  Release-Development: Configuration/Development.xcconfig
  Debug-Production: Configuration/Production.xcconfig
  Release-Production: Configuration/Production.xcconfig
packages:
  NeoGymKit:
    path: .
schemes:
  NeoGym Dev:
    build:
      targets:
        NeoGym: all
    run:
      config: Debug-Development
      enableGPUFrameCaptureMode: disabled
      enableGPUValidationMode: false
      disableMainThreadChecker: true
      disableThreadPerformanceChecker: true
    test:
      config: Debug-Development
    analyze:
      config: Debug-Development
    profile:
      config: Release-Development
    archive:
      config: Release-Development
  NeoGym:
    build:
      targets:
        NeoGym: all
    run:
      config: Debug-Production
      enableGPUFrameCaptureMode: disabled
      enableGPUValidationMode: false
      disableMainThreadChecker: true
      disableThreadPerformanceChecker: true
    test:
      config: Debug-Production
    analyze:
      config: Debug-Production
    profile:
      config: Release-Production
    archive:
      config: Release-Production
targets:
  NeoGym:
    type: application
    platform: iOS
    deploymentTarget: "26.6"
    sources:
      - path: App
        excludes:
          - Info.plist
      - path: Shared
    resources:
      - path: App/Assets.xcassets
      - path: App/LaunchScreen.storyboard
    dependencies:
      - package: NeoGymKit
        product: NeoGymKit
      - target: NeoGymWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(NEOGYM_APP_BUNDLE_IDENTIFIER)
        PRODUCT_NAME: NeoGym
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: App/NeoGym.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: $(NEOGYM_APP_ICON_NAME)
        TARGETED_DEVICE_FAMILY: "1"
  NeoGymWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.6"
    sources:
      - path: Widgets
        excludes:
          - Info.plist
      - path: Shared
    dependencies:
      - package: NeoGymKit
        product: NeoGymKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(NEOGYM_WIDGET_BUNDLE_IDENTIFIER)
        PRODUCT_NAME: NeoGymWidgets
        INFOPLIST_FILE: Widgets/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: Widgets/NeoGymWidgets.entitlements
        APPLICATION_EXTENSION_API_ONLY: true
        SKIP_INSTALL: true
        TARGETED_DEVICE_FAMILY: "1"

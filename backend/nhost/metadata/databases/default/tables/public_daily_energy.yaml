table:
  name: daily_energy
  schema: public
configuration:
  column_config:
    active_kcal:
      custom_name: activeKcal
    created_at:
      custom_name: createdAt
    energy_on:
      custom_name: energyOn
    id:
      custom_name: id
    notes:
      custom_name: notes
    resting_kcal:
      custom_name: restingKcal
    updated_at:
      custom_name: updatedAt
    user_id:
      custom_name: userId
  custom_column_names:
    active_kcal: activeKcal
    created_at: createdAt
    energy_on: energyOn
    id: id
    notes: notes
    resting_kcal: restingKcal
    updated_at: updatedAt
    user_id: userId
  custom_name: dailyEnergy
  custom_root_fields:
    delete: deleteDailyEnergyEntries
    delete_by_pk: deleteDailyEnergyEntry
    insert: insertDailyEnergyEntries
    insert_one: insertDailyEnergyEntry
    select: dailyEnergyEntries
    select_aggregate: dailyEnergyEntriesAggregate
    select_by_pk: dailyEnergyEntry
    update: updateDailyEnergyEntries
    update_by_pk: updateDailyEnergyEntry
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: X-Hasura-User-Id
      columns:
        - energy_on
        - active_kcal
        - resting_kcal
        - notes
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - energy_on
        - active_kcal
        - resting_kcal
        - notes
        - created_at
        - updated_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
update_permissions:
  - role: user
    permission:
      columns:
        - energy_on
        - active_kcal
        - resting_kcal
        - notes
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: null
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id

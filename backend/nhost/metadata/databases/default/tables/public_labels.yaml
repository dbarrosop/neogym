table:
  name: labels
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    id:
      custom_name: id
    is_public:
      custom_name: isPublic
    name:
      custom_name: name
    updated_at:
      custom_name: updatedAt
    user_id:
      custom_name: userId
  custom_column_names:
    created_at: createdAt
    id: id
    is_public: isPublic
    name: name
    updated_at: updatedAt
    user_id: userId
  custom_name: labels
  custom_root_fields:
    delete: deleteLabels
    delete_by_pk: deleteLabel
    insert: insertLabels
    insert_one: insertLabel
    select: labels
    select_aggregate: labelsAggregate
    select_by_pk: label
    update: updateLabels
    update_by_pk: updateLabel
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: workoutLabels
    using:
      foreign_key_constraint_on:
        column: label_id
        table:
          name: workout_labels
          schema: public
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - user_id:
              _eq: X-Hasura-User-Id
          - is_public:
              _eq: false
      set:
        user_id: X-Hasura-User-Id
      columns:
        - name
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - name
        - user_id
        - is_public
        - created_at
        - updated_at
      filter:
        _or:
          - user_id:
              _eq: X-Hasura-User-Id
          - is_public:
              _eq: true
      allow_aggregations: true
delete_permissions:
  - role: user
    permission:
      filter:
        _and:
          - user_id:
              _eq: X-Hasura-User-Id
          - is_public:
              _eq: false

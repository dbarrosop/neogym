table:
  name: workouts
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    description:
      custom_name: description
    id:
      custom_name: id
    is_public:
      custom_name: isPublic
    name:
      custom_name: name
    updated_at:
      custom_name: updatedAt
    user_id:
      custom_name: userId
  custom_column_names:
    created_at: createdAt
    description: description
    id: id
    is_public: isPublic
    name: name
    updated_at: updatedAt
    user_id: userId
  custom_name: workouts
  custom_root_fields:
    delete: deleteWorkouts
    delete_by_pk: deleteWorkout
    insert: insertWorkouts
    insert_one: insertWorkout
    select: workouts
    select_aggregate: workoutsAggregate
    select_by_pk: workout
    update: updateWorkouts
    update_by_pk: updateWorkout
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: workoutExercises
    using:
      foreign_key_constraint_on:
        column: workout_id
        table:
          name: workout_exercises
          schema: public
  - name: workoutSessions
    using:
      foreign_key_constraint_on:
        column: workout_id
        table:
          name: workout_sessions
          schema: public
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - user_id:
              _eq: X-Hasura-User-Id
          - is_public:
              _eq: false
      set:
        user_id: X-Hasura-User-Id
      columns:
        - name
        - description
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - name
        - description
        - user_id
        - is_public
        - created_at
        - updated_at
      filter:
        _or:
          - user_id:
              _eq: X-Hasura-User-Id
          - is_public:
              _eq: true
      allow_aggregations: true
update_permissions:
  - role: user
    permission:
      columns:
        - name
        - description
      filter:
        _and:
          - user_id:
              _eq: X-Hasura-User-Id
          - is_public:
              _eq: false
      check:
        _and:
          - user_id:
              _eq: X-Hasura-User-Id
          - is_public:
              _eq: false
delete_permissions:
  - role: user
    permission:
      filter:
        _and:
          - user_id:
              _eq: X-Hasura-User-Id
          - is_public:
              _eq: false

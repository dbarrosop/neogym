table:
  name: journal_entry_labels
  schema: public
configuration:
  column_config:
    entry_id:
      custom_name: entryId
    label_id:
      custom_name: labelId
  custom_column_names:
    entry_id: entryId
    label_id: labelId
  custom_name: journalEntryLabels
  custom_root_fields:
    delete: deleteJournalEntryLabels
    delete_by_pk: deleteJournalEntryLabel
    insert: insertJournalEntryLabels
    insert_one: insertJournalEntryLabel
    select: journalEntryLabels
    select_aggregate: journalEntryLabelsAggregate
    select_by_pk: journalEntryLabel
    update: updateJournalEntryLabels
    update_by_pk: updateJournalEntryLabel
object_relationships:
  - name: journalEntry
    using:
      foreign_key_constraint_on: entry_id
  - name: journalLabel
    using:
      foreign_key_constraint_on: label_id
insert_permissions:
  - role: user
    permission:
      check:
        journalEntry:
          user_id:
            _eq: X-Hasura-User-Id
      columns:
        - entry_id
        - label_id
select_permissions:
  - role: user
    permission:
      columns:
        - entry_id
        - label_id
      filter:
        journalEntry:
          user_id:
            _eq: X-Hasura-User-Id
      allow_aggregations: true
delete_permissions:
  - role: user
    permission:
      filter:
        journalEntry:
          user_id:
            _eq: X-Hasura-User-Id

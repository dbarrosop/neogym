table:
  name: workout_session_cardio_entries
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    entry_number:
      custom_name: entryNumber
    id:
      custom_name: id
    metrics:
      custom_name: metrics
    updated_at:
      custom_name: updatedAt
    workout_session_exercise_id:
      custom_name: workoutSessionExerciseId
  custom_column_names:
    created_at: createdAt
    entry_number: entryNumber
    id: id
    metrics: metrics
    updated_at: updatedAt
    workout_session_exercise_id: workoutSessionExerciseId
  custom_name: workoutSessionCardioEntries
  custom_root_fields:
    delete: deleteWorkoutSessionCardioEntries
    delete_by_pk: deleteWorkoutSessionCardioEntry
    insert: insertWorkoutSessionCardioEntries
    insert_one: insertWorkoutSessionCardioEntry
    select: workoutSessionCardioEntries
    select_aggregate: workoutSessionCardioEntriesAggregate
    select_by_pk: workoutSessionCardioEntry
    update: updateWorkoutSessionCardioEntries
    update_by_pk: updateWorkoutSessionCardioEntry
object_relationships:
  - name: workoutSessionExercise
    using:
      foreign_key_constraint_on: workout_session_exercise_id
insert_permissions:
  - role: user
    permission:
      check:
        workoutSessionExercise:
          workoutSession:
            user_id:
              _eq: X-Hasura-User-Id
      columns:
        - workout_session_exercise_id
        - entry_number
        - metrics
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - workout_session_exercise_id
        - entry_number
        - metrics
        - created_at
        - updated_at
      filter:
        workoutSessionExercise:
          workoutSession:
            user_id:
              _eq: X-Hasura-User-Id
      allow_aggregations: true
update_permissions:
  - role: user
    permission:
      columns:
        - entry_number
        - metrics
      filter:
        workoutSessionExercise:
          workoutSession:
            user_id:
              _eq: X-Hasura-User-Id
      check:
        workoutSessionExercise:
          workoutSession:
            user_id:
              _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        workoutSessionExercise:
          workoutSession:
            user_id:
              _eq: X-Hasura-User-Id

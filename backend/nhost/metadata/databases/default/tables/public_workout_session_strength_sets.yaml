table:
  name: workout_session_strength_sets
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    id:
      custom_name: id
    parent_kind:
      custom_name: parentKind
    reps:
      custom_name: reps
    set_number:
      custom_name: setNumber
    updated_at:
      custom_name: updatedAt
    weight:
      custom_name: weight
    workout_session_exercise_id:
      custom_name: workoutSessionExerciseId
  custom_column_names:
    created_at: createdAt
    id: id
    parent_kind: parentKind
    reps: reps
    set_number: setNumber
    updated_at: updatedAt
    weight: weight
    workout_session_exercise_id: workoutSessionExerciseId
  custom_name: workoutSessionStrengthSets
  custom_root_fields:
    delete: deleteWorkoutSessionStrengthSets
    delete_by_pk: deleteWorkoutSessionStrengthSet
    insert: insertWorkoutSessionStrengthSets
    insert_one: insertWorkoutSessionStrengthSet
    select: workoutSessionStrengthSets
    select_aggregate: workoutSessionStrengthSetsAggregate
    select_by_pk: workoutSessionStrengthSet
    update: updateWorkoutSessionStrengthSets
    update_by_pk: updateWorkoutSessionStrengthSet
object_relationships:
  - name: workoutSessionExercise
    using:
      foreign_key_constraint_on:
        - workout_session_exercise_id
        - parent_kind
insert_permissions:
  - role: user
    permission:
      check:
        workoutSessionExercise:
          workoutSession:
            user_id:
              _eq: X-Hasura-User-Id
      columns:
        - workout_session_exercise_id
        - set_number
        - reps
        - weight
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - workout_session_exercise_id
        - set_number
        - reps
        - weight
        - created_at
        - updated_at
      filter:
        workoutSessionExercise:
          workoutSession:
            user_id:
              _eq: X-Hasura-User-Id
      allow_aggregations: true
update_permissions:
  - role: user
    permission:
      columns:
        - set_number
        - reps
        - weight
      filter:
        workoutSessionExercise:
          workoutSession:
            user_id:
              _eq: X-Hasura-User-Id
      check:
        workoutSessionExercise:
          workoutSession:
            user_id:
              _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        workoutSessionExercise:
          workoutSession:
            user_id:
              _eq: X-Hasura-User-Id
